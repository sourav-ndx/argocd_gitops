apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sourav-ndx/argocd_gitops.git
    targetRevision: main
    path: manifests/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: webapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
