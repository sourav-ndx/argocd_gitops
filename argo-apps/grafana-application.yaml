apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webapp-grafana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sourav-ndx/argocd_gitops.git
    targetRevision: main
    path: manifests/grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
